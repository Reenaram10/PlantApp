<!DOCTYPE html>
<html>
<head>
  <title>Green-Buy Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family: Arial;
      background: #f3f8f3;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }
    .box{
      width:350px;
      background:white;
      padding:25px;
      border-radius:14px;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
    }
    h2{
      text-align:center;
      color:#006400;
    }
    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid #ccc;
      outline:none;
    }
    button{
      width:100%;
      padding:10px;
      border:none;
      background:#006400;
      color:white;
      border-radius:10px;
      cursor:pointer;
      margin-top:10px;
      font-weight:bold;
    }
    button:hover{
      background:#004d00;
    }
    .link-btn{
      background:#444;
    }
    .guest-btn{
      background:#d4af37;
      color:black;
    }
    .msg{
      margin-top:10px;
      text-align:center;
      font-size:14px;
      color:red;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>🌿 Green-Buy</h2>

  <!-- LOGIN -->
  <div id="loginBox">
    <h3>Login</h3>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPass" placeholder="Password">
    
    <button onclick="login()">Login</button>

    <button class="link-btn" onclick="showRegister()">New user? Register</button>
    <button class="guest-btn" onclick="guestLogin()">Continue as Guest</button>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" style="display:none;">
    <h3>Register</h3>
    <input type="email" id="regEmail" placeholder="Email">
    <input type="text" id="regUsername" placeholder="Username">
    <input type="password" id="regPass" placeholder="Password">
    <button onclick="register()">Register</button>

    <button class="link-btn" onclick="showLogin()">Already have account? Login</button>
    <button class="guest-btn" onclick="guestLogin()">Continue as Guest</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
  const API_BASE_URL = "http://127.0.0.1:5001";

  function showRegister(){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("registerBox").style.display="block";
    document.getElementById("msg").innerText="";
  }

  function showLogin(){
    document.getElementById("registerBox").style.display="none";
    document.getElementById("loginBox").style.display="block";
    document.getElementById("msg").innerText="";
  }

  async function login(){
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPass").value.trim();

    if(!email || !password){
      document.getElementById("msg").innerText="⚠️ Enter email and password!";
      return;
    }

    const res = await fetch(`${API_BASE_URL}/login`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({email, password})
    });

    const data = await res.json();

    if(data.status === "success"){
  localStorage.setItem("user_id", data.user_id);
  localStorage.setItem("email", data.email);
  localStorage.setItem("username", data.username);
  window.location.href = "index.html";
}
else {
  document.getElementById("msg").innerText = data.message || "Login failed!";
}
  }

  async function register(){
  const username = document.getElementById("regUsername").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const password = document.getElementById("regPass").value.trim();

  if(!username || !email || !password){
    document.getElementById("msg").innerText="⚠️ Username, Email and Password required!";
    return;
  }

  const res = await fetch(`${API_BASE_URL}/register`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ username, email, password })
  });

  const data = await res.json();

  if(data.status === "success"){
    localStorage.setItem("user_id", data.user_id);
    localStorage.setItem("email", data.email);
    localStorage.setItem("username", data.username);
    window.location.href = "index.html";
  } else {
    document.getElementById("msg").innerText = data.message || "Register failed!";
  }
}

  function guestLogin(){
    localStorage.setItem("user_id", "anonymous");
    localStorage.removeItem("email");
    window.location.href = "index.html";
  }
</script>

</body>
</html>
